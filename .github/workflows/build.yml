name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Windows build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "6.0.x"

      - name: Restore
        run: dotnet restore PresetSnip.sln

      - name: Build
        run: dotnet build PresetSnip.sln -c Release --no-restore

      - name: Publish portable executable
        run: dotnet publish PresetSnip.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true -o artifacts/PresetSnip-win-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PresetSnip-win-x64
          path: artifacts/PresetSnip-win-x64/
